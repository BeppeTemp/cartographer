name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The git-backed tests (gitx, kb, bootstrap) need an identity and the
      # "master" initial branch on a bare environment (same setup as the
      # Dockerfile test stage).
      - name: Configure git for tests
        run: |
          git config --global user.name ci
          git config --global user.email ci@local
          git config --global init.defaultBranch master
      - run: make vet
      - run: make test

  # With squash-merge the PR title becomes the commit on main that
  # release-please reads: it must be a valid conventional commit.
  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
