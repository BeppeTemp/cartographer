name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Binaries + checksums attached to the release-please release, plus the
  # Homebrew formula pushed to BeppeTemp/homebrew-tap.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Multi-arch server image on ghcr.io.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/beppetemp/cartographer:${{ github.ref_name }}
            ghcr.io/beppetemp/cartographer:latest

  # Metadata entry in the official MCP Registry, pointing at the ghcr image
  # (ownership verified via the io.modelcontextprotocol.server.name LABEL).
  mcp-registry:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" --arg img "ghcr.io/beppetemp/cartographer:${GITHUB_REF_NAME}" \
            '.version = $v | .packages[0].identifier = $img' server.json > server.tmp && mv server.tmp server.json
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
